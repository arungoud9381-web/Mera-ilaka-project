<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mera Ilaka</title>

    <link rel="stylesheet" href="../css main/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


</head>

<body>

    <div class="login-container">

        <div class="right">

            <div class="login-box">

                <h1>Create Account</h1>

                <p>Join Your Neighborhood Community</p>

                <form id="registerForm">

                    <div class="input-box">

                        <i class="fa fa-user"></i>

                        <input type="text" id="fullname" placeholder="Full Name" required>

                    </div>

                    <div class="input-box">

                        <i class="fa fa-phone"></i>

                        <input type="tel" id="mobile" placeholder="Mobile Number" required>

                    </div>

                    <div class="input-box">

                        <i class="fa fa-envelope"></i>

                        <input type="email" id="email" placeholder="Email Address" required>

                    </div>

                    <div class="input-box">

                        <i class="fa fa-location-dot"></i>

                        <input type="text" id="address" placeholder="Apartment / Colony" required>

                    </div>

                    <div class="input-box">

                        <i class="fa fa-lock"></i>

                        <input type="password" id="password" placeholder="Password" required>

                        <i class="fa fa-eye togglePassword" id="togglePassword">
                        </i>

                    </div>

                    <div class="input-box">

                        <i class="fa fa-lock"></i>

                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

                    </div>

                    <div id="strength"></div>

                    <label class="terms">

                        <input type="checkbox" id="terms">

                        I agree to Terms & Conditions

                    </label>

                    <button>

                        Create Account

                    </button>

                </form>

                <div class="bottom">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

    <script src="../js main/register.js"></script>

</body>

</html>
