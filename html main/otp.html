<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>OTP Verification</title>

    <link rel="stylesheet" href="../css main/auth.css">


</head>

<body>

    <div class="login-container">


        <div class="right">

            <div class="login-box">

                <h1>Verify OTP</h1>

                <p>Enter the 6-digit OTP sent to your mobile/email</p>

                <form id="otpForm">

                    <div class="otp-box">

                        <input maxlength="1" class="otp">
                        <input maxlength="1" class="otp">
                        <input maxlength="1" class="otp">
                        <input maxlength="1" class="otp">
                        <input maxlength="1" class="otp">
                        <input maxlength="1" class="otp">

                    </div>

                    <p id="timer">

                        01:00

                    </p>

                    <button>

                        Verify OTP

                    </button>

                </form>

                <div class="bottom">

                    Didn't receive OTP?

                    <a href="#" id="resend">

                        Resend OTP

                    </a>

                </div>

            </div>

        </div>

    </div>

    <script src="js/otp.js"></script>

</body>

</html>
