<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mera Ilaka | Chat</title>

    <link rel="stylesheet" href="../css main/chat.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="chat-container">

        <aside class="chat-sidebar">

            <h2>

                <i class="fa-solid fa-comments"></i>

                Chats

            </h2>

            <div class="search-box">

                <input type="text" id="searchUser" placeholder="Search contacts...">

            </div>

            <ul class="contact-list">

                <li class="contact active">

                    <i class="fa-solid fa-circle-user"></i>

                    <div>

                        <h4>Community Group</h4>

                        <small class="online">

                            🟢 120 Members Online

                        </small>

                    </div>

                </li>

                <li class="contact">

                    <i class="fa-solid fa-circle-user"></i>

                    <div>

                        <h4>Kumar</h4>

                        <small class="online">

                            🟢 Online

                        </small>

                    </div>

                </li>

                <li class="contact">

                    <i class="fa-solid fa-circle-user"></i>

                    <div>

                        <h4>Priya</h4>

                        <small class="offline">

                            ⚪ Offline

                        </small>

                    </div>

                </li>

                <li class="contact">

                    <i class="fa-solid fa-circle-user"></i>

                    <div>

                        <h4>Rahul</h4>

                        <small class="online">

                            🟢 Online

                        </small>

                    </div>

                </li>

            </ul>

        </aside>

        <!-- Chat Area -->

        <main class="chat-main">

            <header class="chat-header">

                <button onclick="window.location.href='dashboard.html'">

                    <i class="fa-solid fa-arrow-left"></i>

                </button>

                <h2>

                    Community Group

                </h2>

            </header>

            <div class="chat-box" id="chatBox">

                <div class="message received">

                    Welcome to Mera Ilaka Community Chat 👋

                </div>

                <div class="message sent">

                    Hello everyone!

                </div>

            </div>

            <div class="chat-input">

                <button id="emojiBtn">

                    😊

                </button>

                <input type="text" id="messageInput" placeholder="Type a message...">

                <button id="sendBtn">

                    <i class="fa-solid fa-paper-plane"></i>

                </button>

            </div>

        </main>

    </div>

    <script src="../js main/chat.js"></script>

</body>

</html>
