<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Events Management</title>

    <link rel="stylesheet" href="../css main/events.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <h2>🎉 Mera Ilaka Admin</h2>

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

    </header>

    <div class="container">

        <h1>Events Management</h1>

        <!-- Add Event -->

        <div class="form-box">

            <h2>Add New Event</h2>

            <div class="row">

                <input type="text" id="eventName" placeholder="Event Name">

                <select id="category">

                    <option value="">Select Category</option>

                    <option>Festival</option>

                    <option>Health</option>

                    <option>Education</option>

                    <option>Career</option>

                    <option>Sports</option>

                    <option>Entertainment</option>

                    <option>Community</option>

                    <option>Others</option>

                </select>

            </div>

            <div class="row">

                <input type="date" id="date">

                <input type="time" id="time">

            </div>

            <div class="row">

                <input type="text" id="location" placeholder="Location">

                <input type="text" id="organizer" placeholder="Organizer">

            </div>

            <div class="row">

                <input type="text" id="phone" placeholder="Phone Number">

                <select id="status">

                    <option>Active</option>

                    <option>Inactive</option>

                </select>

            </div>

            <textarea id="description" placeholder="Event Description"></textarea>

            <input type="text" id="image" placeholder="Image URL">

            <div class="buttons">

                <button id="saveEventBtn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Event

                </button>

                <button id="clearBtn">

                    <i class="fa-solid fa-eraser"></i>

                    Clear

                </button>

            </div>

        </div>

        <!-- Search -->

        <div class="search-box">

            <input type="text" id="searchEvent" placeholder="Search Event...">

        </div>

        <!-- Events Table -->

        <table id="eventTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Event</th>

                    <th>Category</th>

                    <th>Date</th>

                    <th>Location</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="../js main/events.js"></script>

</body>

</html>
