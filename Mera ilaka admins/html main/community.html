<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Community Management | Admin</title>

    <link rel="stylesheet" href="../css main/community.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h2>🏘️ Mera Ilaka Admin</h2>

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

    </header>

    <!-- Main Container -->

    <div class="container">

        <h1>Community Management</h1>

        <!-- Search -->

        <div class="search-box">

            <input type="text" id="searchPost" placeholder="Search by User, Title or Category">

        </div>

        <!-- Table -->

        <table id="communityTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>User</th>

                    <th>Title</th>

                    <th>Category</th>

                    <th>Date</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <!-- JavaScript -->

            </tbody>

        </table>

    </div>

    <script src="../js main/community.js"></script>

</body>

</html>
