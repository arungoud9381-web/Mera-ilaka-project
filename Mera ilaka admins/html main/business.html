<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business | Admin</title>

    <link rel="stylesheet" href="../css main/business.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h2>Mera Ilaka - Admin</h2>

        <button id="dashboardBtn">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </button>

    </header>

    <!-- Main Container -->

    <div class="container">

        <h1>Business</h1>

        <!-- =======================
                Add Business Form
        ======================== -->

        <div class="form-box">

            <h2>Add New Business</h2>

            <div class="form-group">

                <label>Business Name</label>

                <input type="text" id="businessName">

            </div>

            <div class="form-group">

                <label>Owner Name</label>

                <input type="text" id="ownerName">

            </div>

            <div class="form-group">

                <label>Category</label>

                <select id="category">

                    <option value="">Select Category</option>

                    <option>Electronics</option>

                    <option>Grocery</option>

                    <option>Restaurant</option>

                    <option>Medical</option>

                    <option>Education</option>

                    <option>Fashion</option>

                    <option>Services</option>

                    <option>Others</option>

                </select>

            </div>

            <div class="form-group">

                <label>Address</label>

                <textarea id="address"></textarea>

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input type="text" id="phone">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email" id="email">

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea id="description"></textarea>

            </div>

            <div class="form-group">

                <label>Business Image URL</label>

                <input type="text" id="image" placeholder="Paste Image URL">
            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="status">

                    <option>Active</option>

                    <option>Inactive</option>

                </select>

            </div>

            <div class="buttons">

                <button id="saveBusinessBtn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Business

                </button>

                <button id="clearBtn">

                    <i class="fa-solid fa-eraser"></i>

                    Clear

                </button>

            </div>

        </div>

        <div class="search-box">

            <input type="text" id="searchBusiness" placeholder="Search Business...">

        </div>
        <table id="businessTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Business</th>

                    <th>Owner</th>

                    <th>Category</th>

                    <th>Phone</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="../js main/business.js"></script>

</body>

</html>
