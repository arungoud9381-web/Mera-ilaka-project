<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notifications Management</title>

    <link rel="stylesheet" href="../css main/notifications.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <header>

            <div>

                <h1>Notifications Management</h1>

                <p>Manage Notifications</p>

            </div>

            <div class="header-buttons">

                <button id="dashboardBtn">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </button>

                <button id="addNotificationBtn">

                    <i class="fa-solid fa-bell"></i>

                    Add Notification

                </button>

            </div>

        </header>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" id="searchNotification" placeholder="Search Notification">

        </div>

        <table id="notificationTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Title</th>

                    <th>Message</th>

                    <th>Type</th>

                    <th>Date</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="../js main/notifications.js"></script>

</body>

</html>
