<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Services | Admin</title>

    <link rel="stylesheet" href="../css main/service.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <h2>Mera Ilaka - Admin</h2>

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

    </header>

    <div class="container">

        <h1>Services</h1>

        <div class="form-box">

            <h2>Add New Service</h2>

            <div class="form-group">

                <label>Service Name</label>

                <input type="text" id="serviceName">

            </div>

            <div class="form-group">

                <label>Provider Name</label>

                <input type="text" id="providerName">

            </div>

            <div class="form-group">

                <label>Category</label>

                <select id="category">

                    <option value="">Select Category</option>

                    <option>Home Services</option>

                    <option>Repairs</option>

                    <option>Health</option>

                    <option>Education</option>

                    <option>Beauty</option>

                    <option>Cleaning</option>

                    <option>Transport</option>

                    <option>Others</option>

                </select>

            </div>

            <div class="form-group">

                <label>Address</label>

                <textarea id="address"></textarea>

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input type="text" id="phone">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email" id="email">

            </div>

            <div class="form-group">

                <label>Experience</label>

                <input type="text" id="experience" placeholder="Example : 8 Years">

            </div>

            <div class="form-group">

                <label>Price</label>

                <input type="text" id="price" placeholder="Example : ₹500">

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea id="description"></textarea>

            </div>

            <div class="form-group">

                <label>Service Image URL</label>

                <input type="text" id="image" placeholder="Paste Image URL">

            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="status">

                    <option>Active</option>

                    <option>Inactive</option>

                </select>

            </div>

            <div class="buttons">

                <button id="saveServiceBtn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Service

                </button>

                <button id="clearBtn">

                    <i class="fa-solid fa-eraser"></i>

                    Clear

                </button>

            </div>

        </div>

       

        <div class="search-box">

            <input type="text" id="searchService" placeholder="Search Service...">

        </div>

     

        <table id="serviceTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Service</th>

                    <th>Provider</th>

                    <th>Category</th>

                    <th>Phone</th>

                    <th>Price</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="../js main/service.js"></script>

</body>

</html>
