<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reports | Admin</title>

    <link rel="stylesheet" href="../css main/reports.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <h2>Mera Ilaka - Admin</h2>

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

    </header>

    <div class="container">

        <h1>Reports Dashboard</h1>

        <div class="report-grid">

            <div class="card">

                <i class="fa-solid fa-users"></i>

                <h3>Total Users</h3>

                <h2 id="totalUsers">0</h2>

            </div>

            <div class="card">

                <i class="fa-solid fa-store"></i>

                <h3>Total Businesses</h3>

                <h2 id="totalBusinesses">0</h2>

            </div>

            <div class="card">

                <i class="fa-solid fa-screwdriver-wrench"></i>

                <h3>Total Services</h3>

                <h2 id="totalServices">0</h2>

            </div>

            <div class="card">

                <i class="fa-solid fa-calendar-days"></i>

                <h3>Total Events</h3>

                <h2 id="totalEvents">0</h2>

            </div>

            <div class="card">

                <i class="fa-solid fa-comments"></i>

                <h3>Community Posts</h3>

                <h2 id="totalPosts">0</h2>

            </div>

            <div class="card">

                <i class="fa-solid fa-headset"></i>

                <h3>Support Requests</h3>

                <h2 id="totalSupport">0</h2>

            </div>

        </div>

    </div>

    <script src="../js main/reports.js"></script>

</body>

</html>
