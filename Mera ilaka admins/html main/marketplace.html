<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Marketplace</title>

    <link rel="stylesheet" href="../css main/marketplace.css">

</head>

<body>

    <header>

        <h2>Mera Ilaka - Admin</h2>

        <nav>

            <a href="dashboard.html">Dashboard</a>

            <a href="marketplace.html" class="active">Marketplace</a>

            <a href="profile.html">Profile</a>

            <a href="../login.html">Logout</a>

        </nav>

    </header>

    <div class="container">

        <h1>Marketplace Management</h1>

        <!-- Statistics -->

        <div class="stats">

            <div class="card">

                <h3>Total Products</h3>

                <p id="totalProducts">0</p>

            </div>

            <div class="card">

                <h3>Available</h3>

                <p id="availableProducts">0</p>

            </div>

            <div class="card">

                <h3>Sold</h3>

                <p id="soldProducts">0</p>

            </div>

        </div>

        <!-- Product Form -->

        <div class="form-box">

            <h2>Add Product</h2>

            <form id="productForm">

                <input type="text" id="productName" placeholder="Product Name" required>

                <input type="text" id="sellerName" placeholder="Seller Name" required>

                <input type="text" id="category" placeholder="Category" required>

                <input type="number" id="price" placeholder="Price" required>

                <textarea id="description" placeholder="Description" rows="4" required></textarea>

                <input type="text" id="contact" placeholder="Contact Number" required>

                <select id="status">

                    <option value="Available">Available</option>

                    <option value="Sold">Sold</option>

                </select>

                <button type="submit" id="saveBtn">

                    Add Product

                </button>

            </form>

        </div>

        <!-- Search -->

        <div class="search-box">

            <input type="text" id="searchProduct" placeholder="Search Product">

        </div>

        <!-- Product Table -->

        <table id="productTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Product</th>

                    <th>Seller</th>

                    <th>Category</th>

                    <th>Price</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>
    <div id="viewModal" class="modal">

        <div class="modal-content">

            <span id="closeView">&times;</span>

            <h2>Product Details</h2>

            <div id="viewContent"></div>

        </div>

    </div>

    <script src="../js main/marketplace.js"></script>

</body>

</html>
