<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marketplace Management</title>

    <link rel="stylesheet" href="../css main/marketplace.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <header>

            <div>

                <h1>Marketplace Management</h1>

                <p>Manage Marketplace Products</p>

            </div>

            <div class="header-buttons">

                <button id="dashboardBtn">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </button>

                <button id="addProductBtn">

                    <i class="fa-solid fa-plus"></i>

                    Add Product

                </button>

            </div>

        </header>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" id="searchProduct" placeholder="Search Product">

        </div>

        <table id="productTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Product</th>

                    <th>Seller</th>

                    <th>Price</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="../js main/marketplace.js"></script>

</body>

</html>
