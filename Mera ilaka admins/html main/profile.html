<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Profile</title>

    <link rel="stylesheet" href="../css main/profile.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <header>

            <h1>Admin Profile</h1>

            <button id="dashboardBtn">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </button>

        </header>

        <div class="profile-card">

            <div class="profile-icon">

                👨‍💼

            </div>

            <input type="file" id="imageInput" accept="image/*">

            <input type="text" id="adminName" placeholder="Admin Name">

            <input type="email" id="adminEmail" placeholder="Email">

            <input type="text" id="adminPhone" placeholder="Phone Number">

            <input type="text" id="adminAddress" placeholder="Address">

            <input type="password" id="adminPassword" placeholder="New Password">

            <button id="saveBtn">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Profile

            </button>

        </div>

    </div>

    <script src="../js main/profile.js"></script>

</body>

</html>
