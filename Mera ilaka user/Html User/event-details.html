<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Details | Mera Ilaka</title>

    <link rel="stylesheet" href="../CSS User/event-details.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <h2>🎉 Mera Ilaka</h2>

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

    </header>

    <div class="container">

        <div class="event-card">

            <div class="event-content">

                <h1 id="eventName"></h1>

                <p>

                    <strong>Category :</strong>

                    <span id="eventCategory"></span>

                </p>

                <p>

                    <strong>Date :</strong>

                    <span id="eventDate"></span>

                </p>

                <p>

                    <strong>Time :</strong>

                    <span id="eventTime"></span>

                </p>

                <p>

                    <strong>Location :</strong>

                    <span id="eventLocation"></span>

                </p>

                <p>

                    <strong>Organizer :</strong>

                    <span id="eventOrganizer"></span>

                </p>

                <p>

                    <strong>Phone :</strong>

                    <span id="eventPhone"></span>

                </p>

                <p>

                    <strong>Status :</strong>

                    <span id="eventStatus"></span>

                </p>

                <h3>Description</h3>

                <p id="eventDescription"></p>

                <div class="buttons">

                    <button id="callBtn">

                        <i class="fa-solid fa-phone"></i>

                        Call Organizer

                    </button>

                    <button id="backBtn">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="../JS User/event-details.js"></script>

</body>

</html>
