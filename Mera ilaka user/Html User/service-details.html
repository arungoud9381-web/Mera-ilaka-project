<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Service Details | Mera Ilaka</title>

    <link rel="stylesheet" href="../CSS User/service-details.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <h2>Mera Ilaka</h2>

    </header>

    <div class="container">

        <button id="backBtn">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </button>

        <div class="service-card">

            <img id="serviceImage" src="" alt="Service Image">

            <h1 id="serviceName"></h1>

            <p>

                <strong>Provider :</strong>

                <span id="provider"></span>

            </p>

            <p>

                <strong>Category :</strong>

                <span id="category"></span>

            </p>

            <p>

                <strong>Address :</strong>

                <span id="address"></span>

            </p>

            <p>

                <strong>Phone :</strong>

                <span id="phone"></span>

            </p>

            <p>

                <strong>Email :</strong>

                <span id="email"></span>

            </p>

            <p>

                <strong>Experience :</strong>

                <span id="experience"></span>

            </p>

            <p>

                <strong>Price :</strong>

                <span id="price"></span>

            </p>

            <p>

                <strong>Status :</strong>

                <span id="status"></span>

            </p>

            <h3>Description</h3>

            <p id="description"></p>

            <div class="buttons">

                <button id="callBtn">

                    <i class="fa-solid fa-phone"></i>

                    Call Now

                </button>

                <button id="bookBtn">

                    <i class="fa-solid fa-calendar-check"></i>

                    Book Service

                </button>

            </div>

        </div>

    </div>

    <script src="../JS User/service-details.js"></script>

</body>

</html>
