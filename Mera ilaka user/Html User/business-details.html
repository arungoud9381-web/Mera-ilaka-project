<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business Details | Mera Ilaka</title>

    <link rel="stylesheet" href="../css user/business-details.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <h2>Mera Ilaka</h2>

    </header>

    <div class="container">

        <button id="backBtn">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </button>

        <div class="business-card">

            <img id="businessImage" src="" alt="Business Image">

            <h1 id="businessName"></h1>

            <p>

                <strong>Owner :</strong>

                <span id="owner"></span>

            </p>

            <p>

                <strong>Category :</strong>

                <span id="category"></span>

            </p>

            <p>

                <strong>Address :</strong>

                <span id="address"></span>

            </p>

            <p>

                <strong>Phone :</strong>

                <span id="phone"></span>

            </p>

            <p>

                <strong>Email :</strong>

                <span id="email"></span>

            </p>

            <p>

                <strong>Status :</strong>

                <span id="status"></span>

            </p>

            <h3>Description</h3>

            <p id="description"></p>

            <button id="callBtn">

                <i class="fa-solid fa-phone"></i>

                Call Business

            </button>

        </div>

    </div>

    <script src="../JS User/business-details.js"></script>

</body>

</html>
