<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | Mera Ilaka</title>

    <link rel="stylesheet" href="../CSS User/marketplace.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- Header -->

    <header>

        <h2>🛒 Mera Ilaka Marketplace</h2>

        <nav>

            <a href="dashboard.html">🏠 Dashboard</a>

            <a href="profile.html">👤 Profile</a>

            <a href="../landing/index.html">🚪 Logout</a>

        </nav>

    </header>

    <!-- Search -->

    <section class="search-box">

        <input type="text" id="search" placeholder="🔍 Search Products">

    </section>

    <!-- Products -->

    <section class="products" id="productContainer">

        <!-- Product 1 -->

        <div class="card">

            <div class="emoji">💻</div>

            <h3>Laptop</h3>

            <p>👤 Seller : Arun</p>

            <p>💰 ₹45,000</p>

            <p class="available">🟢 Available</p>

            <div class="buttons">

                <button class="view">
                    👁 View
                </button>

                <button class="wishlist">
                    ❤️ Wishlist
                </button>

                <button class="cart">
                    🛒 Cart
                </button>

                <button class="buy">
                    ⚡ Buy Now
                </button>

            </div>

        </div>

        <!-- Product 2 -->

        <div class="card">

            <div class="emoji">📱</div>

            <h3>Mobile Phone</h3>

            <p>👤 Seller : Sai Krishna</p>

            <p>💰 ₹15,000</p>

            <p class="available">🟢 Available</p>

            <div class="buttons">

                <button class="view">
                    👁 View
                </button>

                <button class="wishlist">
                    ❤️ Wishlist
                </button>

                <button class="cart">
                    🛒 Cart
                </button>

                <button class="buy">
                    ⚡ Buy Now
                </button>

            </div>

        </div>

        <!-- Product 3 -->

        <div class="card">

            <div class="emoji">⌚</div>

            <h3>Smart Watch</h3>

            <p>👤 Seller : Ravi</p>

            <p>💰 ₹3,500</p>

            <p class="sold">🔴 Sold</p>

            <div class="buttons">

                <button class="view">
                    👁 View
                </button>

                <button class="wishlist">
                    ❤️ Wishlist
                </button>

                <button class="cart">
                    🛒 Cart
                </button>

                <button class="buy">
                    ⚡ Buy Now
                </button>

            </div>

        </div>

        <!-- Product 4 -->

        <div class="card">

            <div class="emoji">🎧</div>

            <h3>Headphones</h3>

            <p>👤 Seller : Kiran</p>

            <p>💰 ₹2,000</p>

            <p class="available">🟢 Available</p>

            <div class="buttons">

                <button class="view">
                    👁 View
                </button>

                <button class="wishlist">
                    ❤️ Wishlist
                </button>

                <button class="cart">
                    🛒 Cart
                </button>

                <button class="buy">
                    ⚡ Buy Now
                </button>

            </div>

        </div>

    </section>

    <script src="../JS User/marketplace.js"></script>

</body>

</html>
