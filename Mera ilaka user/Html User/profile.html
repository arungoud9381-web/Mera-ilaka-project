<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | Mera Ilaka</title>

    <link rel="stylesheet" href="../css user/profile.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h2>🏘️ Mera Ilaka</h2>

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

    </header>

    <!-- Profile Container -->

    <div class="container">

        <!-- Profile Card -->

        <div class="profile-card">

            <div class="profile-image">

                <img id="profileImage" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">

            </div>

            <h2 id="userName">User Name</h2>

            <p id="userEmail">user@email.com</p>

            <form id="profileForm">

                <div class="form-group">

                    <label>Full Name</label>

                    <input type="text" id="name">

                </div>

                <div class="form-group">

                    <label>Phone Number</label>

                    <input type="text" id="phone">

                </div>

                <div class="form-group">

                    <label>Address</label>

                    <textarea id="address" rows="4"></textarea>

                </div>

                <button type="submit" id="saveBtn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Changes

                </button>

            </form>

            <button id="logoutBtn" class="logout">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </button>

        </div>

        <!-- Community Posts -->

        <div class="posts-card">

            <h2>🏘️ My Community Posts</h2>

            <div id="myPosts">

                <!-- JavaScript -->

            </div>

        </div>

    </div>

    <script src="../JS User/profile.js"></script>

</body>

</html>
