<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Community Post</title>

    <link rel="stylesheet" href="../css user/create-post.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h2>🏘️ Mera Ilaka</h2>

        <button id="communityBtn">

            <i class="fa-solid fa-arrow-left"></i>

            Community

        </button>

    </header>

    <!-- Container -->

    <div class="container">

        <h1>Create Community Post</h1>

        <div class="form-box">

            <div class="form-group">

                <label>Title</label>

                <input type="text" id="title">

            </div>

            <div class="form-group">

                <label>Category</label>

                <select id="category">

                    <option value="">Select Category</option>

                    <option>General</option>

                    <option>Announcement</option>

                    <option>Lost & Found</option>

                    <option>Emergency</option>

                    <option>Festival</option>

                    <option>Education</option>

                    <option>Jobs</option>

                    <option>Marketplace</option>

                    <option>Events</option>

                    <option>Others</option>

                </select>

            </div>

            <div class="form-group">

                <label>Image URL</label>

                <input type="text" id="image">

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea id="description" rows="6"></textarea>

            </div>

            <div class="buttons">

                <button id="submitBtn">

                    <i class="fa-solid fa-paper-plane"></i>

                    Submit Post

                </button>

                <button id="clearBtn" type="button">

                    <i class="fa-solid fa-eraser"></i>

                    Clear

                </button>

            </div>

        </div>

    </div>

    <script src="../JS User/create-post.js"></script>

</body>

</html>
